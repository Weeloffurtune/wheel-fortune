<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎡 Fortune Wheel — Квартальные Бонусы</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
      color: #fff;
      text-align: center;
      padding: 30px 20px;
      margin: 0;
      min-height: 100vh;
    }
    h1 {
      font-size: 2.8em;
      margin: 10px 0 5px;
      text-shadow: 0 0 20px #ffd700;
      color: #ffd700;
    }
    .subtitle {
      font-size: 1.3em;
      color: #aaa;
      margin-bottom: 30px;
    }
    canvas {
      border: 14px solid #ffd700;
      border-radius: 50%;
      box-shadow: 0 0 60px rgba(255, 215, 0, 0.9),
                  inset 0 0 40px rgba(255,255,255,0.3);
      background: #000;
      max-width: 100%;
      height: auto;
    }
    .controls {
      margin: 40px 0 20px;
    }
    button {
      margin: 8px;
      padding: 14px 32px;
      font-size: 22px;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
    }
    #spinSilver { background: #a8a8a8; color: #000; }
    #spinGold   { background: #ffd700; color: #000; }
    #spinPlatinum { background: linear-gradient(#e5e5e5, #b0b0b0); color: #000; }

    button:hover { transform: scale(1.08); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    #result {
      margin-top: 30px;
      font-size: 2em;
      font-weight: bold;
      min-height: 70px;
      text-shadow: 0 0 15px #ffd700;
    }
    .remaining {
      margin-top: 20px;
      font-size: 1.1em;
      color: #ccc;
    }
    .container { max-width: 680px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎡 Fortune Wheel</h1>
    <p class="subtitle">Квартальные бонусы — последний weekly митинг</p>
    
    <canvas id="wheel" width="560" height="560"></canvas>

    <div class="controls">
      <button id="spinSilver">Silver Wheel (1 спин)</button>
      <button id="spinGold">Gold Wheel (2 спина)</button>
      <button id="spinPlatinum">Platinum Wheel (3 спина)</button>
    </div>

    <div id="result"></div>
    <div class="remaining" id="remaining"></div>
  </div>

  <script>
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const resultDiv = document.getElementById('result');
    const remainingDiv = document.getElementById('remaining');

    // Призы — можно менять текст и добавлять новые
    let prizes = [
      { name: "€50 cash",                  color: "#FF6B6B" },
      { name: "3 food deliveries",         color: "#4ECDC4" },
      { name: "2 extra days off",          color: "#45B7D1" },
      { name: "3 full-body massage",       color: "#96CEB4" },
      { name: "1-month AI subscription\n(ChatGPT / Claude / Grok)", color: "#FFEEAD" },
      { name: "Universal gift card €75",   color: "#D4A5A5" },
      { name: "Cinema / Theatre deluxe",   color: "#FF9FF3" }
    ];

    let currentPrizes = [...prizes]; // рабочая копия (призы будут удаляться)

    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const radius = 245;

    let rotation = 0;
    let isSpinning = false;

    function drawWheel() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const total = currentPrizes.length;
      if (total === 0) return;

      const arc = (2 * Math.PI) / total;

      currentPrizes.forEach((prize, i) => {
        const angle = rotation + arc * i;

        // Сектор
        ctx.beginPath();
        ctx.fillStyle = prize.color;
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, angle, angle + arc);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "#111";
        ctx.lineWidth = 8;
        ctx.stroke();

        // Текст приза
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(angle + arc / 2);
        ctx.textAlign = "right";
        ctx.fillStyle = "#000";
        ctx.font = "bold 18px Arial";
        ctx.shadowColor = "#fff";
        ctx.shadowBlur = 6;

        const lines = prize.name.split('\n');
        lines.forEach((line, idx) => {
          ctx.fillText(line, radius - 40, 8 + idx * 22);
        });
        ctx.restore();
      });

      // Золотая центральная кнопка + указатель сверху
      ctx.beginPath();
      ctx.fillStyle = "#111";
      ctx.arc(centerX, centerY, 50, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#ffd700";
      ctx.font = "bold 42px Arial";
      ctx.textAlign = "center
