<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boutique Support Victorine - Fortune Wheel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Impact:wght@400;700&family=Arial:wght@700&display=swap');

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
      color: #fff;
      text-align: center;
      padding: 30px 20px;
      margin: 0;
      min-height: 100vh;
    }
    h1 {
      font-family: 'Impact', 'Arial Black', sans-serif;
      font-size: 2.8em;
      color: #ffd700;
      text-shadow: 0 0 35px #ffd700;
      margin: 10px 0 8px;
      letter-spacing: 2px;
    }
    .subtitle {
      font-size: 1.6em;
      color: #ccc;
      margin-bottom: 30px;
      font-weight: bold;
    }
    canvas {
      border: 24px solid #ffd700;
      border-radius: 50%;
      box-shadow: 0 0 95px rgba(255, 215, 0, 0.95), inset 0 0 75px rgba(255,255,255,0.4);
      max-width: 100%;
      height: auto;
    }
    .controls { margin: 45px 0 30px; }
    button {
      margin: 8px 6px;
      padding: 16px 40px;
      font-size: 24px;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(0,0,0,0.6);
      transition: all 0.3s;
    }
    #spinSilver   { background: #c0c0c0; color: #111; }
    #spinGold     { background: #ffd700; color: #111; }
    #spinPlatinum { background: linear-gradient(#f0f0f0, #b0b0b0); color: #111; }
    button:hover:not(:disabled) { transform: scale(1.08); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #result { margin-top: 30px; font-size: 2.2em; font-weight: bold; min-height: 80px; text-shadow: 0 0 20px #ffd700; }
    .remaining { margin-top: 25px; font-size: 1.3em; color: #ddd; }
  </style>
</head>
<body>
  <div class="container" style="max-width: 780px; margin: 0 auto;">
    <h1>🎡 Boutique Support Victorine</h1>
    <p class="subtitle">Quarterly Bonuses</p>
    
    <canvas id="wheel" width="780" height="780"></canvas>

    <div class="controls">
      <button id="spinSilver">Silver (1 spin)</button>
      <button id="spinGold">Gold (2 spins)</button>
      <button id="spinPlatinum">Platinum (3 spins)</button>
    </div>

    <div id="result"></div>
    <div class="remaining">Remaining prizes: <span id="count">8</span></div>
  </div>

  <script>
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const resultDiv = document.getElementById('result');
    const countSpan = document.getElementById('count');

    let prizes = [
      { name: "€50 Cash", color: "#FF6B6B" },
      { name: "Food Deliveries", color: "#4ECDC4" },
      { name: "Days Off", color: "#45B7D1" },
      { name: "Massage", color: "#96CEB4" },
      { name: "AI Sub", color: "#FFEEAD" },
      { name: "€75 Gift", color: "#D4A5A5" },
      { name: "Cinema", color: "#FF9FF3" },
      { name: "Barbershop", color: "#FFCC66" }
    ];

    let currentPrizes = [...prizes];
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const radius = 335;
    let rotation = 0;
    let isSpinning = false;

    function drawWheel() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const total = currentPrizes.length;
      if (total === 0) return;
      const arc = (2 * Math.PI) / total;

      currentPrizes.forEach((prize, i) => {
        const angle = rotation + arc * i;

        ctx.beginPath();
        ctx.fillStyle = prize.color;
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, angle, angle + arc);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "#111";
        ctx.lineWidth = 16;
        ctx.stroke();

        // Горизонтальный текст по центру сектора
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(angle + arc / 2);
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#111";
        ctx.font = "bold 21px Arial";
        ctx.shadowColor = "#fff";
        ctx.shadowBlur = 12;

        ctx.fillText(prize.name, radius - 105, 0);
        ctx.restore();
      });

      // Центр
      ctx.beginPath();
      ctx.fillStyle = "#111";
      ctx.arc(centerX, centerY, 65, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#ffd700";
      ctx.font = "bold 48px Arial";        // ← SPIN стал меньше
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("SPIN", centerX, centerY);

      // Указатель
      ctx.save();
      ctx.translate(centerX + radius + 32, centerY);
      ctx.fillStyle = "#ffd700";
      ctx.shadowColor = "#fff";
      ctx.shadowBlur = 25;
      ctx.beginPath();
      ctx.moveTo(-10, -38);
      ctx.lineTo(-72, 0);
      ctx.lineTo(-10, 38);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function spinWheel(spinsCount) {
      if (isSpinning || currentPrizes.length === 0) return;
      isSpinning = true;
      resultDiv.textContent = "Spinning...";

      let spinsDone = 0;

      function doOneSpin() {
        const totalRotations = 6 + Math.random() * 5;
        const extraAngle = Math.random() * 2 * Math.PI;
        const targetRotation = rotation + totalRotations * 2 * Math.PI + extraAngle;

        let startTime = Date.now();
        const duration = 4300;

        function animate() {
          const elapsed = Date.now() - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const ease = 1 - Math.pow(1 - progress, 4);

          rotation = targetRotation * ease;
          drawWheel();

          if (progress < 1) requestAnimationFrame(animate);
          else {
            rotation = targetRotation;
            drawWheel();

            const normalized = (rotation % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
            const index = Math.floor((2 * Math.PI - normalized) / (2 * Math.PI / currentPrizes.length)) % currentPrizes.length;
            const winner = currentPrizes[index];

            resultDiv.innerHTML = `🎉 <strong>${winner.name}</strong>`;

            currentPrizes.splice(index, 1);
            countSpan.textContent = currentPrizes.length;

            spinsDone++;
            if (spinsDone < spinsCount && currentPrizes.length > 0) setTimeout(doOneSpin, 900);
            else isSpinning = false;
          }
        }
        animate();
      }
      doOneSpin();
    }

    document.getElementById('spinSilver').addEventListener('click', () => spinWheel(1));
    document.getElementById('spinGold').addEventListener('click', () => spinWheel(2));
    document.getElementById('spinPlatinum').addEventListener('click', () => spinWheel(3));

    drawWheel();
  </script>
</body>
</html>
