<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lucky Spin Rewards</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Impact:wght@400;700&family=Trebuchet+MS:wght@400;700&display=swap');
    
    body {
      font-family: 'Trebuchet MS', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
      color: #fff;
      text-align: center;
      padding: 30px 20px;
      margin: 0;
      min-height: 100vh;
    }
    h1 {
      font-family: 'Impact', 'Trebuchet MS', sans-serif;
      font-size: 3em;
      color: #ffd700;
      text-shadow: 0 0 40px #ffd700;
      margin: 10px 0 8px;
      letter-spacing: 3px;
    }
    canvas {
      border: 24px solid #ffd700;
      border-radius: 50%;
      box-shadow: 0 0 95px rgba(255, 215, 0, 0.95), inset 0 0 75px rgba(255,255,255,0.4);
      max-width: 100%;
      height: auto;
    }
    .controls { margin: 45px 0 30px; }
    button {
      margin: 8px 6px;
      padding: 16px 40px;
      font-size: 24px;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(0,0,0,0.6);
      transition: all 0.3s;
    }
    #spinSilver { background: #c0c0c0; color: #111; }
    #spinGold { background: #ffd700; color: #111; }
    #spinPlatinum { 
      background: linear-gradient(135deg, #e0e0ff, #a0a0ff, #c0c0ff); 
      color: #111; 
      box-shadow: 0 0 20px rgba(160, 160, 255, 0.6);
    }
    button:hover:not(:disabled) { transform: scale(1.08); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Поп-апы */
    #nameModal, #winModal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: linear-gradient(135deg, #ff69b4, #ff1493);
      padding: 45px 55px;
      border-radius: 24px;
      text-align: center;
      max-width: 520px;
      box-shadow: 0 0 70px rgba(255, 20, 147, 0.9);
      color: white;
    }
    .modal-content input {
      width: 100%;
      padding: 14px;
      font-size: 1.4em;
      border: none;
      border-radius: 12px;
      margin: 20px 0;
      text-align: center;
    }
    .modal-content button {
      background: white;
      color: #ff1493;
      padding: 14px 60px;
      font-size: 1.4em;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      margin: 10px;
    }
  </style>
</head>
<body>
  <div class="container" style="max-width: 780px; margin: 0 auto;">
    <h1>Lucky Spin Rewards</h1>
   
    <canvas id="wheel" width="780" height="780"></canvas>
   
    <div class="controls">
      <button id="spinSilver">Silver (1 spin)</button>
      <button id="spinGold">Gold (2 spins)</button>
      <button id="spinPlatinum">Platinum (3 spins)</button>
    </div>
   
    <div id="result"></div>
    <div class="remaining">Remaining prizes: <span id="count">7</span></div>
  </div>

  <!-- Поп-ап ввода имени -->
  <div id="nameModal">
    <div class="modal-content">
      <h2>Who's spinning?</h2>
      <input type="text" id="agentInput" placeholder="Enter agent name" autofocus>
      <div>
        <button onclick="startSpin()">Start Spinning</button>
      </div>
    </div>
  </div>

  <!-- Поп-ап с выигрышем -->
  <div id="winModal">
    <div class="modal-content">
      <h2 id="winTitle">Congratulations!</h2>
      <p id="winText" style="font-size:1.35em; line-height:1.5;"></p>
      <button id="winButton">OK</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const resultDiv = document.getElementById('result');
    const countSpan = document.getElementById('count');
    const nameModal = document.getElementById('nameModal');
    const winModal = document.getElementById('winModal');
    const agentInput = document.getElementById('agentInput');
    const winTitle = document.getElementById('winTitle');
    const winText = document.getElementById('winText');
    const winButton = document.getElementById('winButton');

    let currentAgent = "";
    let remainingSpins = 0;        // ← сколько спинов ещё нужно сделать
    let isSpinning = false;

    let shortPrizes = [
      { name: "💰 €50 cash", color: "#FF6B6B" },
      { name: "🍔 3 food deliveries", color: "#4ECDC4" },
      { name: "🏖️ 2 extra days off", color: "#45B7D1" },
      { name: "💆 3 massage", color: "#96CEB4" },
      { name: "🤖 1-month AI", color: "#FFEEAD" },
      { name: "🎟️ €75 gift card", color: "#D4A5A5" },
      { name: "🎬 Cinema deluxe", color: "#FF9FF3" }
    ];

    const fullPrizes = [
      "€50 cash",
      "3 food deliveries covered by the company",
      "2 extra days off covered by the company",
      "3 full-body massage sessions",
      "A 1-month subscriptions to ChatGPT Plus, Claude Pro, Grok (X Premium), or another AI tool",
      "Universal gift card (€75) (Amazon or local platforms)",
      "Cinema/theatre/ ballet night deluxe (tickets + snacks + drinks)",
      "Barbershop visit (for men) or hair styling/manicure (for women)"
    ];

    let currentPrizes = [...shortPrizes];
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const radius = 335;
    let rotation = 0;

    function launchConfetti() {
      const colors = ['#ffd700', '#ff00cc', '#00ffff', '#7CFF2E', '#FF2D55'];
      for (let i = 0; i < 220; i++) {
        setTimeout(() => {
          const c = document.createElement('div');
          c.style.position = 'fixed';
          c.style.left = Math.random() * 100 + 'vw';
          c.style.top = '-20px';
          c.style.width = '13px';
          c.style.height = '13px';
          c.style.background = colors[Math.floor(Math.random() * colors.length)];
          c.style.zIndex = '9999';
          document.body.appendChild(c);
          c.animate([{ transform: 'translateY(0) rotate(0deg)' }, { transform: `translateY(${window.innerHeight + 250}px) rotate(${Math.random() * 1200}deg)` }], { duration: 2800 + Math.random() * 2200, easing: 'cubic-bezier(0.25, 0.1, 0.25, 1)' });
          setTimeout(() => c.remove(), 5000);
        }, i * 1.5);
      }
    }

    function showNameModal(spinsCount) {
      remainingSpins = spinsCount;
      agentInput.value = "";
      nameModal.style.display = 'flex';
      agentInput.focus();
    }

    function startSpin() {
      currentAgent = agentInput.value.trim() || "Agent";
      nameModal.style.display = 'none';
      spinWheel();
    }

    function showWinModal(prizeIndex) {
      const fullPrizeText = fullPrizes[prizeIndex];
      winTitle.innerHTML = `Congratulations, <strong>${currentAgent}</strong>!`;
      winText.innerHTML = fullPrizeText;

      const isLastSpin = remainingSpins <= 1;

      if (remainingSpins === 1) {
        // Silver
        winButton.textContent = "Claim Reward";
        winButton.onclick = closeWinModal;
      } else {
        // Gold / Platinum
        winButton.textContent = "Next Spin →";
        winButton.onclick = () => {
          closeWinModal();
          if (remainingSpins > 1) spinWheel();
        };
      }

      winModal.style.display = 'flex';
      launchConfetti();
    }

    function closeWinModal() {
      winModal.style.display = 'none';
    }

    function drawWheel() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const total = currentPrizes.length;
      if (total === 0) return;
      const arc = (2 * Math.PI) / total;

      currentPrizes.forEach((prize, i) => {
        const angle = rotation + arc * i;
        ctx.beginPath();
        ctx.fillStyle = prize.color;
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, angle, angle + arc);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "#111";
        ctx.lineWidth = 16;
        ctx.stroke();

        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(angle + arc / 2);
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#111";
        ctx.font = "bold 19px 'Trebuchet MS', Arial";
        ctx.shadowColor = "#fff";
        ctx.shadowBlur = 12;
        ctx.fillText(prize.name, radius - 132, -6);
        ctx.restore();
      });

      ctx.beginPath();
      ctx.fillStyle = "#111";
      ctx.arc(centerX, centerY, 65, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#ffd700";
      ctx.font = "bold 48px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("SPIN", centerX, centerY);

      ctx.save();
      ctx.translate(centerX + radius + 32, centerY);
      ctx.fillStyle = "#ffd700";
      ctx.shadowColor = "#fff";
      ctx.shadowBlur = 25;
      ctx.beginPath();
      ctx.moveTo(-10, -38);
      ctx.lineTo(-72, 0);
      ctx.lineTo(-10, 38);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function spinWheel() {
      if (isSpinning || currentPrizes.length === 0) return;
      isSpinning = true;
      resultDiv.textContent = "Spinning...";

      const totalRotations = 6 + Math.random() * 5;
      const extraAngle = Math.random() * 2 * Math.PI;
      const targetRotation = rotation + totalRotations * 2 * Math.PI + extraAngle;

      let startTime = Date.now();
      const duration = 4300;

      function animate() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const ease = 1 - Math.pow(1 - progress, 4);

        rotation = targetRotation * ease;
        drawWheel();

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          rotation = targetRotation;
          drawWheel();

          const normalized = (rotation % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
          const index = Math.floor((2 * Math.PI - normalized) / (2 * Math.PI / currentPrizes.length)) % currentPrizes.length;

          const winnerShort = currentPrizes[index];
          const winnerIndex = shortPrizes.findIndex(p => p.name === winnerShort.name);

          resultDiv.innerHTML = `🎉 <strong>${winnerShort.name}</strong>`;

          currentPrizes.splice(index, 1);
          countSpan.textContent = currentPrizes.length;

          // 2 секунды задержки перед поп-апом
          setTimeout(() => {
            showWinModal(winnerIndex);
          }, 2000);

          remainingSpins--;
          isSpinning = false;
        }
      }
      animate();
    }

    // Кнопки
    document.getElementById('spinSilver').addEventListener('click', () => showNameModal(1));
    document.getElementById('spinGold').addEventListener('click', () => showNameModal(2));
    document.getElementById('spinPlatinum').addEventListener('click', () => showNameModal(3));

    drawWheel();
    countSpan.textContent = currentPrizes.length;
  </script>
</body>
</html>
