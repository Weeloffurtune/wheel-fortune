<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lucky Spin Rewards</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Impact:wght@400;700&family=Trebuchet+MS:wght@400;700&display=swap');

    body {
      font-family: 'Trebuchet MS', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
      color: #fff;
      text-align: center;
      padding: 30px 20px;
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    h1 {
      font-family: 'Impact', 'Trebuchet MS', sans-serif;
      font-size: 3em;
      color: #ffd700;
      text-shadow: 0 0 40px #ffd700;
      margin: 10px 0 25px;
      letter-spacing: 3px;
    }

    /* ⭐ звезды */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(2px 2px at 20% 30%, #fff, transparent),
        radial-gradient(2px 2px at 70% 60%, #ffd700, transparent),
        radial-gradient(1.5px 1.5px at 40% 80%, #fff, transparent),
        radial-gradient(1.5px 1.5px at 80% 20%, #ffd700, transparent);
      opacity: 0.35;
      pointer-events: none;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
    }

    canvas {
      border: 24px solid #ffd700;
      border-radius: 50%;
      box-shadow: 0 0 95px rgba(255, 215, 0, 0.95), inset 0 0 75px rgba(255,255,255,0.4);
      margin-top: 12px;
    }

    .controls { margin: 45px 0 30px; }

    button {
      margin: 8px 6px;
      padding: 16px 40px;
      font-size: 24px;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(0,0,0,0.6);
      transition: 0.3s;
    }

    #spinSilver { background: #c0c0c0; color: #111; }
    #spinGold { background: #ffd700; color: #111; }
    #spinPlatinum { background: linear-gradient(135deg,#e0e0ff,#a0a0ff,#c0c0ff); }

    button:hover:not(:disabled) { transform: scale(1.08); }
    button:disabled { opacity: 0.5; }

    #nameModal, #winModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: linear-gradient(135deg, #ff69b4, #ff1493);
      padding: 45px;
      border-radius: 24px;
      max-width: 520px;
      color: white;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Lucky Spin Rewards</h1>

  <canvas id="wheel" width="780" height="780"></canvas>

  <div class="controls">
    <button id="spinSilver">Silver (1 spin)</button>
    <button id="spinGold">Gold (2 spins)</button>
    <button id="spinPlatinum">Platinum (3 spins)</button>
  </div>

  <div id="result"></div>
  <div>Remaining prizes: <span id="count">7</span></div>
</div>

<!-- MODALS -->
<div id="nameModal">
  <div class="modal-content">
    <h2>Who's spinning?</h2>
    <input id="agentInput" placeholder="Enter agent name">
    <button onclick="startSpin()">Start</button>
  </div>
</div>

<div id="winModal">
  <div class="modal-content">
    <h2 id="winTitle">Congratulations!</h2>
    <p id="winText"></p>
    <button id="winButton">OK</button>
  </div>
</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const resultDiv = document.getElementById("result");
const countSpan = document.getElementById("count");
const nameModal = document.getElementById("nameModal");
const winModal = document.getElementById("winModal");
const agentInput = document.getElementById("agentInput");
const winTitle = document.getElementById("winTitle");
const winText = document.getElementById("winText");
const winButton = document.getElementById("winButton");

let currentAgent = "";
let remainingSpins = 0;
let isSpinning = false;

let shortPrizes = [
  { name:"💰 €50 cash", color:"#FF6B6B" },
  { name:"🍔 3 food deliveries", color:"#4ECDC4" },
  { name:"🏖️ 2 extra days off", color:"#45B7D1" },
  { name:"💆 3 massage", color:"#96CEB4" },
  { name:"🤖 1-month AI", color:"#FFEEAD" },
  { name:"🎟️ €75 gift card", color:"#D4A5A5" },
  { name:"🎬 Cinema deluxe", color:"#FF9FF3" }
];

const fullPrizes = shortPrizes.map(p => p.name);

let currentPrizes = [...shortPrizes];

const cx = canvas.width/2;
const cy = canvas.height/2;
const radius = 330;
let rotation = 0;

function launchConfetti() {
  const colors = ['#ffd700','#ff00cc','#00ffff','#7CFF2E','#FF2D55'];

  for (let i=0;i<120;i++){
    setTimeout(()=>{
      const c=document.createElement("div");
      c.style.position="fixed";
      c.style.left=Math.random()*100+"vw";
      c.style.top="-10px";
      c.style.width="10px";
      c.style.height="10px";
      c.style.background=colors[Math.floor(Math.random()*colors.length)];
      document.body.appendChild(c);

      c.animate([
        {transform:"translateY(0)"},
        {transform:`translateY(${window.innerHeight+200}px) rotate(720deg)`}
      ],{duration:3000});

      setTimeout(()=>c.remove(),4000);
    },i*10);
  }
}

function drawWheel(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const arc=(2*Math.PI)/currentPrizes.length;

  currentPrizes.forEach((p,i)=>{
    const a=rotation+arc*i;

    ctx.beginPath();
    ctx.fillStyle=p.color;
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,radius,a,a+arc);
    ctx.fill();

    ctx.strokeStyle="#111";
    ctx.lineWidth=10;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(a+arc/2);
    ctx.fillStyle="#111";
    ctx.font="bold 18px Arial";
    ctx.fillText(p.name,radius-120,0);
    ctx.restore();
  });

  ctx.beginPath();
  ctx.fillStyle="#111";
  ctx.arc(cx,cy,60,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#ffd700";
  ctx.font="bold 40px Arial";
  ctx.fillText("SPIN",cx,cy);
}

function spinWheel(){
  if(isSpinning) return;
  isSpinning=true;

  const target=rotation+(6+Math.random()*4)*2*Math.PI;

  let start=Date.now();
  let duration=4000;

  function animate(){
    let t=(Date.now()-start)/duration;
    if(t>1)t=1;

    rotation=target*(1-Math.pow(1-t,4));
    drawWheel();

    if(t<1) requestAnimationFrame(animate);
    else{
      const norm=(rotation%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
      const index=Math.floor((2*Math.PI-norm)/(2*Math.PI/currentPrizes.length));

      const win=currentPrizes[index];

      resultDiv.innerHTML=`🎉 <b>${win.name}</b>`;

      currentPrizes.splice(index,1);
      countSpan.textContent=currentPrizes.length;

      showWin(index);

      isSpinning=false;
    }
  }

  animate();
}

function showWin(i){
  winTitle.innerHTML=`Congratulations, <b>${currentAgent}</b>`;
  winText.innerHTML=fullPrizes[i];
  winModal.style.display="flex";
  launchConfetti();
}

function startSpin(){
  currentAgent=agentInput.value||"Agent";
  nameModal.style.display="none";
  spinWheel();
}

document.getElementById("spinSilver").onclick=()=>{nameModal.style.display="flex";};
document.getElementById("spinGold").onclick=()=>{nameModal.style.display="flex";};
document.getElementById("spinPlatinum").onclick=()=>{nameModal.style.display="flex";};

drawWheel();
</script>

</body>
</html>
